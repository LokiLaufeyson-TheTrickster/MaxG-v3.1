name: MaxG v3.1 Sentinel

on:
  schedule:
    # 9:30 AM IST (04:00 UTC) Monday to Friday
    - cron: '0 4 * * 1-5'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6 hours max (Market Session)
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install supabase

      - name: Run Sentinel
        env:
          GROWW_TOTP_TOKEN: ${{ secrets.GROWW_TOTP_TOKEN }}
          GROWW_TOTP_SECRET: ${{ secrets.GROWW_TOTP_SECRET }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python backend/main.py --headless
