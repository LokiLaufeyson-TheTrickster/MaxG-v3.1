name: MaxG Sentinel Cloud Runner

on:
  schedule:
    # 09:15 AM IST (03:45 UTC) Monday to Friday
    - cron: '45 3 * * 1-5'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 400 # ~6.5 hours (Full Market Session)
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pyotp requests

      - name: Run Sentinel Headless
        env:
          GROWW_TOTP_TOKEN: ${{ secrets.GROWW_TOTP_TOKEN }}
          GROWW_TOTP_SECRET: ${{ secrets.GROWW_TOTP_SECRET }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python backend/main.py --headless
